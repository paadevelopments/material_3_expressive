# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

custom_lint:

analyzer:

  plugins:
    - custom_lint
    
  strong-mode: true
  errors:
    missing_return: error
    unused_local_variable: warning
    dead_code: warning
    avoid_catches_without_on_clauses: ignore
    constant_identifier_names: ignore
    depend_on_referenced_packages: ignore
    invalid_use_of_protected_member: ignore
    unnecessary_lambdas: ignore
    prefer_constructors_over_static_methods: ignore
    type_annotate_public_apis: ignore
    avoid_annotating_with_dynamic: ignore

linter:
  rules:
    # Nomenclature Guidelines & Naming conventions
    - camel_case_types # Enforces naming conventions for types (classes, enums, etc.)
    - avoid_types_as_parameter_names # Avoids using types as parameter names to prevent disinformation
    - non_constant_identifier_names # Enforces intention-revealing names by avoiding disinformation in variable names
    - avoid_positional_boolean_parameters # Use named parameters for clarity and searchability
    - avoid_renaming_method_parameters # Avoids unnecessary renaming that could lead to confusion
    - camel_case_extensions
    - library_names
    - file_names: error
    - constant_identifier_names
    - prefer_function_declarations_over_variables
    - always_declare_return_types # Ensures function signatures are clear and understandable
    - type_annotate_public_apis # Makes APIs more searchable and understandable
    - avoid_private_typedef_functions # Prevents disinformation in method and function naming
    - prefer_constructors_over_static_methods # Ensures class names are noun-based and methods verb-based
    - prefer_generic_function_type_aliases # Encourages meaningful distinctions in method names

    # Functions
    - prefer_final_locals: warning # Encourages immutability to avoid side effects
    - sized_box_for_whitespace
    - prefer_asserts_in_initializer_lists # Ensures single level of abstraction and readability
    - avoid_void_async
    - avoid_returning_null_for_future
    - avoid_returning_null_for_void
    - prefer_void_to_null
    - avoid_returning_this
    - avoid_annotating_with_dynamic

    # Miscellaneous Guidelines
    - always_put_control_body_on_new_line # Improves readability by avoiding long lines
    - lines_longer_than_80_chars: ignore # Limits line length to improve readability and adherence to file length guidelines
    - avoid_empty_else # Encourages clarity and avoids unnecessary code
    - prefer_mixin # Promotes composition over inheritance
    - prefer_final_fields: warning
    - prefer_const_declarations: warning
    - empty_constructor_bodies
    - unnecessary_const
    - unnecessary_new
    - sort_unnamed_constructors_first
    - avoid_catches_without_on_clauses
    - avoid_catching_errors
    - use_rethrow_when_possible

    # DRY and SOLID
    - avoid_redundant_argument_values # Avoids unnecessary repetition, promoting DRY
    - prefer_const_constructors # Promotes immutability and reuse, adhering to SOLID principles
    - prefer_final_in_for_each
    - avoid_print
    - avoid_function_literals_in_foreach_calls
    - prefer_initializing_formals
    - avoid_init_to_null
    - avoid_null_checks_in_equality_operators
    - prefer_is_empty
    - prefer_is_not_empty
    - avoid_unused_constructor_parameters

    # Additional Best Practices
    - unnecessary_null_checks # Avoids redundant checks to keep functions concise
    - no_leading_underscores_for_local_identifiers # Avoids disinformation and mental mapping in variable names
    - avoid_single_cascade_in_expression_statements
    - curly_braces_in_flow_control_structures
    - prefer_conditional_assignment
    - unnecessary_lambdas
    - unnecessary_parenthesis
    - unnecessary_this
    - avoid_slow_async_io
    - prefer_interpolation_to_compose_strings
    - always_put_required_named_parameters_first: ignore
    - always_require_non_null_named_parameters
    - annotate_overrides
    - annotate_redeclares
    - avoid_as
    - avoid_bool_literals_in_conditional_expressions
    - avoid_classes_with_only_static_members
    - avoid_double_and_int_checks
    - avoid_dynamic_calls
    - avoid_equals_and_hash_code_on_mutable_classes
    - avoid_escaping_inner_quotes
    - avoid_field_initializers_in_const_classes
    - avoid_final_parameters
    - avoid_implementing_value_types
    - avoid_js_rounded_ints
    - avoid_multiple_declarations_per_line: ignore
    - avoid_relative_lib_imports
    - avoid_return_types_on_setters
    - avoid_returning_null
    - avoid_setters_without_getters
    - avoid_shadowing_type_parameters
    - avoid_type_to_string
    - avoid_types_on_closure_parameters: ignore
    - avoid_unnecessary_containers
    - avoid_unstable_final_fields
    - avoid_web_libraries_in_flutter
    - await_only_futures
